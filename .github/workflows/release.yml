name: Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.guard.outputs.should_release }}
      version: ${{ steps.guard.outputs.version }}
      release_mode: ${{ steps.guard.outputs.release_mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch tags
        run: git fetch --force --tags origin

      - id: guard
        name: Guard release tag
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          HEAD_SUBJECT=$(git log -1 --pretty=%s)
          if printf '%s' "$HEAD_SUBJECT" | grep -Fq '[skip release]'; then
            echo "Skip release for skip-marked commit: $HEAD_SUBJECT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "release_mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse -q --verify "refs/tags/v${VERSION}" >/dev/null; then
            TAG_SHA=$(git rev-list -n 1 "v${VERSION}")
            if [ "$TAG_SHA" = "$GITHUB_SHA" ]; then
              echo "Release tag v${VERSION} already points to current commit. Allow update."
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "release_mode=update" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Release tag v${VERSION} already exists on another commit (${TAG_SHA}). Skip."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "release_mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "release_mode=create" >> "$GITHUB_OUTPUT"

  build_macos:
    name: macOS bundle (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: prepare_release
    if: needs.prepare_release.outputs.should_release == 'true'
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            target: aarch64-apple-darwin
            runner: macos-latest
          - arch: x86_64
            target: x86_64-apple-darwin
            runner: macos-15-intel
    env:
      CARGO_BUILD_TARGET: ${{ matrix.target }}
      CODESIGN_IDENTITY: ${{ vars.CODESIGN_IDENTITY }}
      NOTARY_PROFILE_NAME: ${{ vars.NOTARY_PROFILE_NAME }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
      APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_API_PRIVATE_KEY_B64: ${{ secrets.APPLE_API_PRIVATE_KEY_B64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate macOS updater signing config
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in \
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD \
            TAURI_SIGNING_PRIVATE_KEY_B64
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing macOS updater signing config:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Detect Apple signing availability
        id: mac_signing
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in \
            CODESIGN_IDENTITY \
            NOTARY_PROFILE_NAME \
            APPLE_TEAM_ID \
            APPLE_CERTIFICATE_P12 \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER_ID \
            APPLE_API_PRIVATE_KEY_B64
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf 'Apple signing config not set; building unsigned macOS artifacts.\n' >&2
          printf '  - %s\n' "${missing[@]}" >&2
          echo "enabled=false" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install CMake
        run: command -v cmake >/dev/null 2>&1 || brew install cmake

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import signing certificate
        if: steps.mac_signing.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          KEYCHAIN=build.keychain
          CERT_PATH=cert.p12

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH" 2>/dev/null || \
            echo "$APPLE_CERTIFICATE_P12" | base64 -D > "$CERT_PATH"

          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN"

      - name: Configure notarytool credentials
        if: steps.mac_signing.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          mkdir -p private_keys
          echo "$APPLE_API_PRIVATE_KEY_B64" | base64 --decode > private_keys/AuthKey.p8
          xcrun notarytool store-credentials "$NOTARY_PROFILE_NAME" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --key "private_keys/AuthKey.p8"

      - name: Write Tauri signing key
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.tauri"
          echo "$TAURI_SIGNING_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.tauri/codexmonitor.key"

      - name: Build app bundle
        run: |
          set -euo pipefail
          export TAURI_SIGNING_PRIVATE_KEY
          TAURI_SIGNING_PRIVATE_KEY="$(cat "$HOME/.tauri/codexmonitor.key")"
          pnpm sync:material-icons
          pnpm prepare:codex-runtime
          pnpm doctor:strict
          pnpm exec tauri build --target "$CARGO_BUILD_TARGET" --bundles app

      - name: Bundle OpenSSL and re-sign
        run: |
          set -euo pipefail
          APP_PATH="src-tauri/target/${CARGO_BUILD_TARGET}/release/bundle/macos/Agent Monitor.app"
          DAEMON_BINARY_PATH="src-tauri/target/${CARGO_BUILD_TARGET}/release/codex_monitor_daemon" \
          DAEMONCTL_BINARY_PATH="src-tauri/target/${CARGO_BUILD_TARGET}/release/codex_monitor_daemonctl" \
          CODESIGN_IDENTITY="$CODESIGN_IDENTITY" \
            scripts/macos-fix-openssl.sh "$APP_PATH"

      - name: Notarize and staple
        if: steps.mac_signing.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          APP_PATH="src-tauri/target/${CARGO_BUILD_TARGET}/release/bundle/macos/Agent Monitor.app"
          ZIP_PATH="CodexMonitor-${{ matrix.arch }}-notarize.zip"

          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          xcrun notarytool submit "$ZIP_PATH" \
            --keychain-profile "$NOTARY_PROFILE_NAME" \
            --wait

          xcrun stapler staple "$APP_PATH"

      - name: Package artifacts
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare_release.outputs.version }}"
          APP_PATH="src-tauri/target/${CARGO_BUILD_TARGET}/release/bundle/macos/Agent Monitor.app"
          APP_DIR="$(dirname "$APP_PATH")"
          BASE_NAME="CodexMonitor_${VERSION}_${{ matrix.arch }}"

          mkdir -p release-artifacts release-artifacts/dmg-root
          rm -rf "release-artifacts/dmg-root/Agent Monitor.app"

          ditto "$APP_PATH" "release-artifacts/dmg-root/Agent Monitor.app"
          ditto -c -k --keepParent "$APP_PATH" "release-artifacts/${BASE_NAME}.zip"

          hdiutil create -volname "Agent Monitor" \
            -srcfolder release-artifacts/dmg-root \
            -ov -format UDZO \
            "release-artifacts/${BASE_NAME}.dmg"

          COPYFILE_DISABLE=1 tar -czf \
            "release-artifacts/${BASE_NAME}.app.tar.gz" \
            -C "$APP_DIR" "Agent Monitor.app"

          pnpm exec tauri signer sign -- \
            -f "$HOME/.tauri/codexmonitor.key" \
            -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "release-artifacts/${BASE_NAME}.app.tar.gz"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts-${{ matrix.arch }}
          path: |
            release-artifacts/*.zip
            release-artifacts/*.dmg
            release-artifacts/*.app.tar.gz
            release-artifacts/*.app.tar.gz.sig

  build_windows:
    name: Windows bundle (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: prepare_release
    if: needs.prepare_release.outputs.should_release == 'true'
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-pc-windows-msvc
            runner: windows-latest
          - arch: aarch64
            target: aarch64-pc-windows-msvc
            runner: windows-11-arm
    env:
      CARGO_BUILD_TARGET: ${{ matrix.target }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Windows updater signing config
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in \
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD \
            TAURI_SIGNING_PRIVATE_KEY_B64
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing Windows updater signing config:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install LLVM
        shell: pwsh
        run: |
          if (Get-Command clang -ErrorAction SilentlyContinue) {
            Write-Host "LLVM already available at $((Get-Command clang).Source)"
            exit 0
          }
          choco install llvm -y --no-progress

      - name: Install CMake
        shell: pwsh
        run: |
          if (Get-Command cmake -ErrorAction SilentlyContinue) {
            Write-Host "CMake already available at $((Get-Command cmake).Source)"
            exit 0
          }
          choco install cmake -y --no-progress

      - name: Configure LLVM
        shell: pwsh
        run: |
          $llvmBin = @(
            "C:\\Program Files\\LLVM\\bin",
            "C:\\Program Files (x86)\\LLVM\\bin"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $llvmBin) {
            $clang = Get-Command clang -ErrorAction Stop
            $llvmBin = Split-Path $clang.Source -Parent
          }

          "LIBCLANG_PATH=$llvmBin" >> $env:GITHUB_ENV
          $llvmBin >> $env:GITHUB_PATH

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write Tauri signing key
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = base64.b64decode(os.environ["TAURI_SIGNING_PRIVATE_KEY_B64"])
          target = Path.home() / ".tauri"
          target.mkdir(parents=True, exist_ok=True)
          (target / "codexmonitor.key").write_bytes(raw)
          PY

      - name: Build Windows bundles
        shell: bash
        run: |
          set -euo pipefail
          export TAURI_SIGNING_PRIVATE_KEY
          TAURI_SIGNING_PRIVATE_KEY="$(cat "$HOME/.tauri/codexmonitor.key")"
          pnpm sync:material-icons
          pnpm prepare:codex-runtime
          pnpm doctor:win
          node scripts/run-tauri-build.mjs \
            --target "$CARGO_BUILD_TARGET" \
            --bundles nsis,msi \
            --config src-tauri/tauri.windows.conf.json

      - name: Normalize Windows artifacts
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare_release.outputs.version }}"
          BASE_NAME="CodexMonitor_${VERSION}_${{ matrix.arch }}"
          BUNDLE_ROOT="src-tauri/target/${CARGO_BUILD_TARGET}/release/bundle"

          mkdir -p release-artifacts

          NSIS_EXE=$(find "$BUNDLE_ROOT/nsis" -type f -name '*.exe' ! -name '*.exe.sig' | head -n 1)
          MSI_FILE=$(find "$BUNDLE_ROOT/msi" -type f -name '*.msi' | head -n 1)

          if [ -z "$NSIS_EXE" ] || [ ! -f "${NSIS_EXE}.sig" ]; then
            echo "Missing NSIS updater artifacts"
            exit 1
          fi
          if [ -z "$MSI_FILE" ] || [ ! -f "${MSI_FILE}.sig" ]; then
            echo "Missing MSI updater artifacts"
            exit 1
          fi

          cp "$NSIS_EXE" "release-artifacts/${BASE_NAME}-setup.exe"
          cp "${NSIS_EXE}.sig" "release-artifacts/${BASE_NAME}-setup.exe.sig"
          cp "$MSI_FILE" "release-artifacts/${BASE_NAME}.msi"
          cp "${MSI_FILE}.sig" "release-artifacts/${BASE_NAME}.msi.sig"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts-${{ matrix.arch }}
          path: |
            release-artifacts/*.exe
            release-artifacts/*.exe.sig
            release-artifacts/*.msi
            release-artifacts/*.msi.sig

  release:
    runs-on: ubuntu-latest
    environment: release
    needs:
      - prepare_release
      - build_macos
      - build_windows
    if: needs.prepare_release.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-artifacts-*
          path: release-artifacts
          merge-multiple: true

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: windows-artifacts-*
          path: release-artifacts
          merge-multiple: true

      - name: Build latest.json
        env:
          VERSION: ${{ needs.prepare_release.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          LAST_TAG=$(git tag --sort=-version:refname \
            | grep -v "^v${VERSION}$" \
            | head -n 1 || true)
          RANGE_END="${GITHUB_SHA}"
          if [ -n "$LAST_TAG" ]; then
            git log "${LAST_TAG}..${RANGE_END}" --pretty=format:"%s" > release-artifacts/release-commits.txt
          else
            git log "${RANGE_END}" --pretty=format:"%s" > release-artifacts/release-commits.txt
          fi

          python3 - <<'PY'
          import json
          import re
          from datetime import datetime, timezone
          from pathlib import Path
          from urllib.parse import quote

          import os

          version = os.environ["VERSION"]
          repository = os.environ["REPOSITORY"]
          artifacts_dir = Path("release-artifacts")

          lines = Path("release-artifacts/release-commits.txt").read_text().splitlines()
          pattern = re.compile(r"^(feat|fix|perf)(?:\([^)]*\))?:\s*(.+)$", re.IGNORECASE)
          groups = {"feat": [], "fix": [], "perf": []}
          for line in lines:
              match = pattern.match(line.strip())
              if not match:
                  continue
              kind = match.group(1).lower()
              message = match.group(2).strip()
              if message:
                  groups[kind].append(message)

          sections = [
              ("## New Features", "feat"),
              ("## Fixes", "fix"),
              ("## Performance Improvements", "perf"),
          ]
          notes_parts = []
          for title, key in sections:
              items = groups[key]
              if not items:
                  continue
              notes_parts.append(title)
              notes_parts.extend(f"- {item}" for item in items)
              notes_parts.append("")

          notes = "\n".join(notes_parts).strip() or "- No user-facing changes."
          Path("release-artifacts/release-notes.md").write_text(notes + "\n")

          def release_url(filename: str) -> str:
              return f"https://github.com/{repository}/releases/download/v{version}/{quote(filename)}"

          payload = {
              "version": version,
              "notes": notes,
              "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": {},
          }

          def register_target(target: str, filename: str):
              file_path = artifacts_dir / filename
              sig_path = artifacts_dir / f"{filename}.sig"
              if not file_path.exists() or not sig_path.exists():
                  raise SystemExit(f"Missing updater artifacts for {target}: {filename}")
              payload["platforms"][target] = {
                  "url": release_url(filename),
                  "signature": sig_path.read_text().strip(),
              }

          for arch in ("aarch64", "x86_64"):
              mac_file = f"CodexMonitor_{version}_{arch}.app.tar.gz"
              if (artifacts_dir / mac_file).exists():
                  register_target(f"darwin-{arch}", mac_file)
                  register_target(f"darwin-{arch}-app", mac_file)

          for arch in ("x86_64", "aarch64"):
              nsis_file = f"CodexMonitor_{version}_{arch}-setup.exe"
              msi_file = f"CodexMonitor_{version}_{arch}.msi"
              if (artifacts_dir / nsis_file).exists():
                  register_target(f"windows-{arch}", nsis_file)
                  register_target(f"windows-{arch}-nsis", nsis_file)
              if (artifacts_dir / msi_file).exists():
                  register_target(f"windows-{arch}-msi", msi_file)

          Path("release-artifacts/latest.json").write_text(
              json.dumps(payload, indent=2) + "\n"
          )
          PY

      - name: Validate latest.json artifact references
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path
          from urllib.parse import unquote, urlparse

          artifacts_dir = Path("release-artifacts")
          payload = json.loads((artifacts_dir / "latest.json").read_text())
          available_files = {path.name for path in artifacts_dir.rglob("*") if path.is_file()}

          missing = []
          for platform, metadata in payload.get("platforms", {}).items():
              url = metadata.get("url", "")
              filename = Path(unquote(urlparse(url).path)).name
              if filename not in available_files:
                  missing.append((platform, filename))

          if missing:
              print("latest.json references missing artifacts:")
              for platform, filename in missing:
                  print(f"- {platform}: {filename}")
              raise SystemExit(1)

          print(f"Validated {len(payload.get('platforms', {}))} latest.json platform URL(s).")
          PY

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare_release.outputs.version }}
          RELEASE_MODE: ${{ needs.prepare_release.outputs.release_mode }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release-artifacts/*)
          release_files=()
          for file in "${files[@]}"; do
            case "$(basename "$file")" in
              release-commits.txt|release-notes.md)
                continue
                ;;
            esac
            if [ -f "$file" ]; then
              release_files+=("$file")
            fi
          done

          if [ ${#release_files[@]} -eq 0 ]; then
            echo "No release artifacts found"
            exit 1
          fi

          if [ "$RELEASE_MODE" = "update" ] && gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release upload "v${VERSION}" "${release_files[@]}" --clobber
            gh release edit "v${VERSION}" \
              --title "v${VERSION}" \
              --notes-file release-artifacts/release-notes.md \
              --latest
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes-file release-artifacts/release-notes.md \
              --target "$GITHUB_SHA" \
              "${release_files[@]}"
          fi

  bump_version:
    runs-on: ubuntu-latest
    environment: release
    needs:
      - prepare_release
      - release
    if: needs.prepare_release.outputs.release_mode == 'create'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Bump version and open PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare_release.outputs.version }}"
          NEXT_VERSION=$(python3 - <<'PY' "$VERSION"
          import sys

          version = sys.argv[1]
          parts = version.split(".")
          if len(parts) != 3:
              raise SystemExit("Expected version like 0.X.Y")

          major, minor, patch = (int(p) for p in parts)
          print(f"{major}.{minor}.{patch + 1}")
          PY
          )

          BRANCH="chore/bump-version-${NEXT_VERSION}"
          TITLE="chore(release): bump version to ${NEXT_VERSION} [skip release]"
          export NEXT_VERSION

          if [ -n "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')" ]; then
            echo "Bump PR already exists for ${NEXT_VERSION}. Skip."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

          python3 - <<'PY'
          import json
          import os
          import re
          import plistlib
          from pathlib import Path

          next_version = os.environ["NEXT_VERSION"]

          package_json = Path("package.json")
          package_data = json.loads(package_json.read_text())
          package_data["version"] = next_version
          package_json.write_text(json.dumps(package_data, indent=2) + "\n")

          tauri_json = Path("src-tauri/tauri.conf.json")
          tauri_data = json.loads(tauri_json.read_text())
          tauri_data["version"] = next_version
          tauri_json.write_text(json.dumps(tauri_data, indent=2) + "\n")

          cargo_toml = Path("src-tauri/Cargo.toml")
          cargo_content = cargo_toml.read_text()
          cargo_content, count = re.subn(
              r'(?m)^version = ".*"$',
              f'version = "{next_version}"',
              cargo_content,
              count=1,
          )
          if count != 1:
              raise SystemExit("Failed to update src-tauri/Cargo.toml version")
          cargo_toml.write_text(cargo_content)

          cargo_lock = Path("src-tauri/Cargo.lock")
          lock_content = cargo_lock.read_text()
          lock_content, count = re.subn(
              r'(?ms)(\[\[package\]\]\nname = "codex-monitor"\nversion = ")[^"]+(")',
              rf'\\g<1>{next_version}\\2',
              lock_content,
              count=1,
          )
          if count != 1:
              raise SystemExit("Failed to update codex-monitor version in src-tauri/Cargo.lock")
          cargo_lock.write_text(lock_content)

          info_plist = Path("src-tauri/gen/apple/codex-monitor_iOS/Info.plist")
          with info_plist.open("rb") as f:
              plist = plistlib.load(f)
          plist["CFBundleShortVersionString"] = next_version
          plist["CFBundleVersion"] = next_version
          with info_plist.open("wb") as f:
              plistlib.dump(plist, f, sort_keys=False)
          PY

          pnpm install --lockfile-only --ignore-scripts

          git add package.json pnpm-lock.yaml src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json src-tauri/gen/apple/codex-monitor_iOS/Info.plist
          git commit -m "$TITLE"
          git push origin "$BRANCH"

          gh pr create \
            --title "$TITLE" \
            --body "Post-release version bump to ${NEXT_VERSION}." \
            --base main \
            --head "$BRANCH"

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck
  test-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Tests
        run: pnpm run test

  test-tauri:
    name: Rust tests (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            os: macos-latest
          - name: Linux
            os: ubuntu-latest
          - name: Windows
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - uses: dtolnay/rust-toolchain@stable
      - name: Compute Rust cache key
        id: rust-cache-key
        run: node scripts/ci-rust-cache-key.mjs
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            src-tauri/binaries
          key: ${{ runner.os }}-${{ github.repository }}-cargo-test-v2-${{ steps.rust-cache-key.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-${{ github.repository }}-cargo-test-v2-
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: command -v cmake >/dev/null 2>&1 || brew install cmake
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            pkg-config
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $missing = @()
          if (-not (Get-Command cmake -ErrorAction SilentlyContinue)) {
            $missing += "cmake"
          }
          if (-not (Get-Command clang -ErrorAction SilentlyContinue)) {
            $missing += "llvm"
          }

          if ($missing.Count -eq 0) {
            Write-Host "CMake and LLVM already available."
            exit 0
          }

          choco install $missing -y --no-progress
      - name: Configure LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $llvmBin = @(
            "C:\Program Files\LLVM\bin",
            "C:\Program Files (x86)\LLVM\bin"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $llvmBin) {
            $clang = Get-Command clang -ErrorAction Stop
            $llvmBin = Split-Path $clang.Source -Parent
          }

          "LIBCLANG_PATH=$llvmBin" >> $env:GITHUB_ENV
          $llvmBin >> $env:GITHUB_PATH
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Prepare bundled runtime assets
        run: |
          pnpm prepare:bundled-skills --strict
          pnpm prepare:codex-runtime
      - name: Rust tests
        run: cargo test
        working-directory: src-tauri
        env:
          TAURI_CONFIG: '{"bundle":{"externalBin":[]}}'

  build-tauri:
    name: Tauri build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    needs:
      - lint
      - typecheck
      - test-js
      - test-tauri
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            os: macos-latest
            build_command: pnpm exec tauri build --debug --no-bundle
          - name: Linux
            os: ubuntu-latest
            build_command: pnpm exec tauri build --debug --no-bundle
          - name: Windows
            os: windows-latest
            build_command: pnpm exec tauri build --debug --no-bundle --config src-tauri/tauri.windows.conf.json
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - uses: dtolnay/rust-toolchain@stable
      - name: Compute Rust cache key
        id: rust-cache-key
        run: node scripts/ci-rust-cache-key.mjs
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            src-tauri/binaries
          key: ${{ runner.os }}-${{ github.repository }}-cargo-build-v2-${{ steps.rust-cache-key.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-${{ github.repository }}-cargo-build-v2-
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: command -v cmake >/dev/null 2>&1 || brew install cmake
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            pkg-config
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $missing = @()
          if (-not (Get-Command cmake -ErrorAction SilentlyContinue)) {
            $missing += "cmake"
          }
          if (-not (Get-Command clang -ErrorAction SilentlyContinue)) {
            $missing += "llvm"
          }

          if ($missing.Count -eq 0) {
            Write-Host "CMake and LLVM already available."
            exit 0
          }

          choco install $missing -y --no-progress
      - name: Configure LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $llvmBin = @(
            "C:\Program Files\LLVM\bin",
            "C:\Program Files (x86)\LLVM\bin"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $llvmBin) {
            $clang = Get-Command clang -ErrorAction Stop
            $llvmBin = Split-Path $clang.Source -Parent
          }

          "LIBCLANG_PATH=$llvmBin" >> $env:GITHUB_ENV
          $llvmBin >> $env:GITHUB_PATH
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Prepare bundled runtime
        run: |
          pnpm sync:material-icons
          pnpm prepare:bundled-skills --strict
          pnpm prepare:codex-runtime
      - name: Doctor (non-Windows)
        if: runner.os != 'Windows'
        run: pnpm run doctor:strict
      - name: Doctor (Windows)
        if: runner.os == 'Windows'
        run: pnpm run doctor:win
      - name: Tauri debug build
        run: ${{ matrix.platform.build_command }}
